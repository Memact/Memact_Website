services:
  - type: web
    name: memact-website
    runtime: static
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    domains:
      - memact.com
      - www.memact.com
    envVars:
      - key: VITE_MEMACT_ACCESS_URL
        value: https://memact-access.onrender.com
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=(), payment=()
      - path: /*
        name: Content-Security-Policy
        value: default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://avatars.githubusercontent.com; connect-src 'self' https://*.supabase.co https://memact-access.onrender.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /logo.png
        name: Cache-Control
        value: public, max-age=86400
      - path: /index.html
        name: Cache-Control
        value: public, max-age=0, must-revalidate
